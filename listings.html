<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房源列表 - CasaCV</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fas fa-home"></i>
                <span>CasaCV</span>
            </a>
            <div class="nav-links">
                <a href="index.html" data-i18n="nav_home">首页</a>
                <a href="listings.html" class="active" data-i18n="nav_listings">房源</a>
                <a href="publish.html" class="btn-primary" data-i18n="nav_publish">发布房源</a>
            </div>
            <div class="nav-actions">
                <div class="language-switcher">
                    <button class="lang-btn" onclick="toggleLang()">
                        <i class="fas fa-globe"></i>
                        <span id="current-lang">中文</span>
                    </button>
                    <div class="lang-dropdown" id="lang-dropdown">
                        <a href="#" onclick="setLanguage('zh')">中文</a>
                        <a href="#" onclick="setLanguage('en')">English</a>
                        <a href="#" onclick="setLanguage('pt')">Português</a>
                    </div>
                </div>
                <a href="#" class="btn-outline" data-i18n="login">登录</a>
            </div>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </nav>

    <!-- 移动端菜单 -->
    <div class="mobile-menu" id="mobile-menu">
        <a href="index.html" data-i18n="nav_home">首页</a>
        <a href="listings.html" data-i18n="nav_listings">房源</a>
        <a href="publish.html" data-i18n="nav_publish">发布房源</a>
        <a href="#" data-i18n="login">登录</a>
    </div>

    <!-- 页面标题 -->
    <section class="page-header">
        <h1 data-i18n="listings_title">房源列表</h1>
        <p data-i18n="listings_subtitle">发现佛得角的优质房源</p>
    </section>

    <!-- 筛选栏 -->
    <section class="filter-bar">
        <div class="filter-container">
            <div class="filter-group">
                <label data-i18n="form_city">城市</label>
                <select id="filter-city">
                    <option value="">所有城市</option>
                    <option value="Praia">普拉亚 Praia</option>
                    <option value="Mindelo">明德卢 Mindelo</option>
                    <option value="Santa Maria">圣玛丽亚 Santa Maria</option>
                    <option value="Sal Rei">萨尔雷 Sal Rei</option>
                </select>
            </div>
            <div class="filter-group">
                <label data-i18n="form_property_type">房屋类型</label>
                <select id="filter-type">
                    <option value="">所有类型</option>
                    <option value="apartment" data-i18n="type_apartment">公寓</option>
                    <option value="house" data-i18n="type_house">独栋房屋</option>
                    <option value="villa" data-i18n="type_villa">别墅</option>
                    <option value="studio" data-i18n="type_studio">单间</option>
                </select>
            </div>
            <div class="filter-group">
                <label data-i18n="form_rent_type">出租类型</label>
                <select id="filter-rent">
                    <option value="">不限</option>
                    <option value="long" data-i18n="rent_long">长租</option>
                    <option value="short" data-i18n="rent_short">短租/民宿</option>
                </select>
            </div>
            <div class="filter-group">
                <label>价格范围</label>
                <select id="filter-price">
                    <option value="">不限</option>
                    <option value="0-20000">0 - 20,000 CVE</option>
                    <option value="20000-50000">20,000 - 50,000 CVE</option>
                    <option value="50000-100000">50,000 - 100,000 CVE</option>
                    <option value="100000-max">100,000+ CVE</option>
                </select>
            </div>
        </div>
    </section>

    <!-- 房源列表 -->
    <section class="listings">
        <div class="container">
            <div id="all-listings" class="listings-grid">
                <!-- 房源卡片将通过JS动态生成 -->
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <a href="index.html" class="logo">
                        <i class="fas fa-home"></i>
                        <span>CasaCV</span>
                    </a>
                    <p data-i18n="footer_desc">佛得角最专业的租房平台，为华人社区提供便捷的租房服务</p>
                    <div class="social-links">
                        <a href="#"><i class="fab fa-weixin"></i></a>
                        <a href="#"><i class="fab fa-whatsapp"></i></a>
                        <a href="#"><i class="fab fa-facebook"></i></a>
                    </div>
                </div>
                <div class="footer-links">
                    <h4 data-i18n="footer_rent">我要租房</h4>
                    <a href="listings.html" data-i18n="nav_listings">房源列表</a>
                    <a href="#" data-i18n="footer_short">短租/民宿</a>
                    <a href="#" data-i18n="footer_long">长租公寓</a>
                    <a href="#" data-i18n="footer_guide">租房攻略</a>
                </div>
                <div class="footer-links">
                    <h4 data-i18n="footer_landlord">我是房东</h4>
                    <a href="publish.html" data-i18n="nav_publish">发布房源</a>
                    <a href="#" data-i18n="footer_tips">房东指南</a>
                    <a href="#" data-i18n="footer_pricing">服务费用</a>
                </div>
                <div class="footer-links">
                    <h4 data-i18n="footer_contact">联系我们</h4>
                    <p><i class="fas fa-phone"></i> +238 9123 4567</p>
                    <p><i class="fas fa-envelope"></i> info@casacv.com</p>
                    <p><i class="fas fa-map-marker-alt"></i> Praia, Cape Verde</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 CasaCV. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/i18n.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
